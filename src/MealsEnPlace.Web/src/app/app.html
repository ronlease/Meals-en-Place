<mat-sidenav-container class="app-container">
  <mat-sidenav mode="side" opened class="app-sidenav">
    <div class="sidenav-header">
      <span class="app-brand">Meals en Place</span>
    </div>

    <mat-nav-list>
      <a
        mat-list-item
        routerLink="/inventory"
        routerLinkActive="active-link"
      >
        <mat-icon matListItemIcon>kitchen</mat-icon>
        <span matListItemTitle>Inventory</span>
      </a>
      <a
        mat-list-item
        routerLink="/expiration"
        routerLinkActive="active-link"
      >
        <mat-icon matListItemIcon>schedule</mat-icon>
        <span matListItemTitle>Expiring Soon</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content class="app-content">
    <mat-toolbar color="primary" class="app-toolbar">
      <span>Meals en Place</span>
      <span class="toolbar-spacer"></span>
      <button
        mat-icon-button
        (click)="themeService.toggleTheme()"
        [attr.aria-label]="themeService.isDarkMode() ? 'Switch to light mode' : 'Switch to dark mode'"
      >
        <mat-icon>{{ themeService.isDarkMode() ? 'light_mode' : 'dark_mode' }}</mat-icon>
      </button>
    </mat-toolbar>

    <main class="app-main">
      <router-outlet />
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
