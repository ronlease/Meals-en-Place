<mat-sidenav-container class="app-container">
  <mat-sidenav
    #sidenav
    [mode]="isMobile() ? 'over' : 'side'"
    [opened]="!isMobile()"
    class="app-sidenav"
  >
    <div class="sidenav-header">
      <span class="app-brand">Meals en Place</span>
    </div>

    <mat-nav-list>
      <a
        mat-list-item
        routerLink="/inventory"
        routerLinkActive="active-link"
        (click)="onNavClick()"
      >
        <mat-icon matListItemIcon>kitchen</mat-icon>
        <span matListItemTitle>Inventory</span>
      </a>
      <a
        mat-list-item
        routerLink="/expiration"
        routerLinkActive="active-link"
        (click)="onNavClick()"
      >
        <mat-icon matListItemIcon>schedule</mat-icon>
        <span matListItemTitle>Expiring Soon</span>
      </a>
      <a
        mat-list-item
        routerLink="/meal-plan"
        routerLinkActive="active-link"
        (click)="onNavClick()"
      >
        <mat-icon matListItemIcon>calendar_month</mat-icon>
        <span matListItemTitle>Meal Plan</span>
      </a>
      <a
        mat-list-item
        routerLink="/recipes"
        routerLinkActive="active-link"
        [routerLinkActiveOptions]="{ exact: false }"
        (click)="onNavClick()"
      >
        <mat-icon matListItemIcon>restaurant</mat-icon>
        <span matListItemTitle>Recipes</span>
      </a>
      <a
        mat-list-item
        routerLink="/recipes/import"
        routerLinkActive="active-link"
        (click)="onNavClick()"
      >
        <mat-icon matListItemIcon>cloud_download</mat-icon>
        <span matListItemTitle>Import Recipes</span>
      </a>
      <a
        mat-list-item
        routerLink="/seasonal-produce"
        routerLinkActive="active-link"
        (click)="onNavClick()"
      >
        <mat-icon matListItemIcon>eco</mat-icon>
        <span matListItemTitle>Seasonal Produce</span>
      </a>
      <a
        mat-list-item
        routerLink="/shopping-list"
        routerLinkActive="active-link"
        (click)="onNavClick()"
      >
        <mat-icon matListItemIcon>shopping_cart</mat-icon>
        <span matListItemTitle>Shopping List</span>
      </a>
      <a
        mat-list-item
        routerLink="/waste-alerts"
        routerLinkActive="active-link"
        (click)="onNavClick()"
      >
        <mat-icon matListItemIcon>compost</mat-icon>
        <span matListItemTitle>Waste Alerts</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content class="app-content">
    <app-offline-banner />

    <mat-toolbar color="primary" class="app-toolbar">
      @if (isMobile()) {
        <button mat-icon-button (click)="sidenav.toggle()" aria-label="Toggle navigation">
          <mat-icon>menu</mat-icon>
        </button>
      }
      <span class="toolbar-brand">Meals en Place</span>
      <span class="toolbar-spacer"></span>
      @if (installPromptService.canInstall()) {
        <button
          mat-icon-button
          (click)="installPromptService.promptInstall()"
          matTooltip="Install app"
          aria-label="Install app"
        >
          <mat-icon>install_mobile</mat-icon>
        </button>
      }
      <button
        mat-icon-button
        (click)="preferencesService.toggleDisplaySystem()"
        [matTooltip]="preferencesService.displaySystem() === 'Imperial' ? 'Switch to Metric' : 'Switch to Imperial'"
        [attr.aria-label]="preferencesService.displaySystem() === 'Imperial' ? 'Switch to Metric' : 'Switch to Imperial'"
      >
        <mat-icon>{{ preferencesService.displaySystem() === 'Imperial' ? 'straighten' : 'square_foot' }}</mat-icon>
      </button>
      <button
        mat-icon-button
        (click)="themeService.toggleTheme()"
        [attr.aria-label]="themeService.isDarkMode() ? 'Switch to light mode' : 'Switch to dark mode'"
      >
        <mat-icon>{{ themeService.isDarkMode() ? 'light_mode' : 'dark_mode' }}</mat-icon>
      </button>
    </mat-toolbar>

    <main class="app-main">
      <router-outlet />
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
